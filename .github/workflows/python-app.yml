# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG: True
      TEMPERATURE: 0.35
      SLACK_BOT_TOKEN: "xoxb-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      OPENAI_API_KEY: ${{secrets.OPENAI_API_KEY}}
      SLACK_APP_TOKEN: "xapp-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
      LANGCHAIN_API_KEY: ${{secrets.LANGCHAIN_API_KEY}}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Poetry Install
        uses: knowsuchagency/poetry-install@v2
        env:
          POETRY_VIRTUALENVS_CREATE: false
      - name: Download Spacy Model
        run: |
          python -m spacy download en_core_web_md
      - name: Print PATH and Git location
        run: |
          echo $PATH
          which git
      - name: Test with pytest
        run: |
          poetry run coverage run -m pytest tests/
          mkdir -p reports
          poetry run coverage lcov -o reports/lcov.info
      - name: Upload coverage to Qlty
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: reports/lcov.info
